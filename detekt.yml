naming:
  InvalidPackageDeclaration:
    active: false
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - 'Composable'

empty-blocks:
  EmptyFunctionBlock:
    ignoreOverridden: true

style:
  ReturnCount:
    active: false
  MagicNumber:
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignorePropertyDeclaration: true
  MaxLineLength:
    maxLineLength: 160
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Comments in Russian are not allowed.'
        value: '[а-яёА-ЯЁ]'
  ForbiddenImport:
    active: true
    includes: ['**/domain/src/**/*.kt']
    imports:
      - value: 'ltd.evilcorp.core.tox.runtime.*'
        reason: 'Domain layer must not depend on concrete Tox JNI runtime.'
      - value: 'ltd.evilcorp.core.db.*'
        reason: 'Domain layer must not depend on Room Database implementation.'
      - value: 'ltd.evilcorp.core.repository.*'
        reason: 'Domain layer must not depend on concrete Repositories. Use interfaces instead.'
      - value: 'ltd.evilcorp.atox.*'
        reason: 'Domain layer must not depend on presentation layer (atox).'

performance:
  SpreadOperator:
    active: false

complexity:
  LargeClass:
    active: true
    threshold: 300
  LongMethod:
    active: true
    threshold: 60
    excludes: ['**/ui/**/*.kt', '**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**']
  ComplexInterface:
    active: true
    threshold: 10
  TooManyFunctions:
    active: false
  LongParameterList:
    active: false
  CyclomaticComplexMethod:
    threshold: 20
    excludes: ['**/ui/**/*.kt', '**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**']
  NestedBlockDepth:
    active: true
    threshold: 5
    excludes: ['**/ui/**/*.kt', '**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**']

exceptions:
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: false
  SwallowedException:
    active: false
