naming:
  InvalidPackageDeclaration:
    active: false

empty-blocks:
  EmptyFunctionBlock:
    ignoreOverridden: true

style:
  ReturnCount:
    active: false
  MagicNumber:
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignorePropertyDeclaration: true
  MaxLineLength:
    maxLineLength: 160

performance:
  SpreadOperator:
    active: false

complexity:
  TooManyFunctions:
    active: false
  LongParameterList:
    active: false
  CyclomaticComplexMethod:
    threshold: 40
  LongMethod:
    threshold: 200
  NestedBlockDepth:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: false
  SwallowedException:
    active: false
